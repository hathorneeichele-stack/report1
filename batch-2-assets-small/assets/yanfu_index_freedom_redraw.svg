<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600">
<rect width="1180" height="600" rx="18" fill="#ffffff"/>
<style>.title{font:850 30px Arial,"Microsoft YaHei",sans-serif;fill:#0b6f9f}.axis{stroke:#0b6895;stroke-width:3}.label{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#374151}.boxtext{font:850 18px Arial,"Microsoft YaHei",sans-serif;fill:#fff}.tickline{stroke:#e8eef5;stroke-width:1}.curve{stroke:#0b5c8d;stroke-width:3;fill:none}.dot{fill:#0b5c8d}.note{font:700 15px Arial,"Microsoft YaHei",sans-serif;fill:#69788b}</style>
<text x="42" y="54" class="title">量化选股（对标指数）的选股自由度</text>
