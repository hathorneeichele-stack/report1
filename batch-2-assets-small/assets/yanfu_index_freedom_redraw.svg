<text x="275.0" y="189" text-anchor="middle" class="boxtext"><tspan x="275.0" dy="0">量化选股</tspan><tspan x="275.0" dy="28">（对标中证全指指数）</tspan></text>
<rect x="395" y="215" width="170" height="118" rx="18" fill="#2f7fae"/>
<text x="480.0" y="259" text-anchor="middle" class="boxtext"><tspan x="480.0" dy="0">量化选股</tspan><tspan x="480.0" dy="28">（对标万得小市值指数）</tspan></text>
<rect x="600" y="215" width="170" height="118" rx="18" fill="#2f7fae"/>
