<rect x="805" y="285" width="170" height="118" rx="18" fill="#4b9dc8"/>
<text x="890.0" y="329" text-anchor="middle" class="boxtext"><tspan x="890.0" dy="0">量化选股</tspan><tspan x="890.0" dy="28">（对标中证500指数）</tspan></text>
<rect x="1010" y="345" width="140" height="118" rx="18" fill="#78bbe5"/>
<text x="1080.0" y="389" text-anchor="middle" class="boxtext"><tspan x="1080.0" dy="0">量化选股</tspan><tspan x="1080.0" dy="28">（对标沪深300指数）</tspan></text>
