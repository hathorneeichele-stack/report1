<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>产品配置｜FOF产品运行情况</title>
  <style>
    :root {
      --ink:#1f2a3d;
      --muted:#6d7788;
      --line:#e8edf5;
      --soft:#f5f7fb;
      --panel:#ffffff;
      --blue:#4268d6;
      --blue-soft:#eef3ff;
      --gold:#b99035;
      --gold-soft:#fff7e6;
      --red:#c9554d;
      --green:#2f9e62;
      --shadow:0 10px 24px rgba(28,41,70,.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      color:var(--ink);
      background:#f2f5fa;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      font-size:14px;
      line-height:1.45;
    }

    button,
    input { font:inherit; }

    .app { min-height:100vh; }

    .topbar {
      position:sticky;
      top:0;
      z-index:20;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:12px 28px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .crumb {
      color:var(--muted);
      font-size:13px;
    }

    .crumb strong {
      margin-left:8px;
      color:var(--ink);
      font-size:16px;
    }

    .toolbar {
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .search {
      width:300px;
      height:36px;
      border:1px solid var(--line);
      border-radius:6px;
      padding:0 12px;
      outline:none;
      background:#fafbfd;
      color:var(--ink);
    }

    .search:focus {
      border-color:#b8c7ff;
      box-shadow:0 0 0 3px rgba(66,104,214,.12);
    }

    .pill {
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:var(--blue-soft);
      color:var(--blue);
      font-weight:700;
      font-size:12px;
      white-space:nowrap;
    }

    .workspace {
      padding:24px 28px 96px;
    }

    .page-head {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }

    h1 {
      margin:0;
      color:var(--ink);
      font-size:24px;
      line-height:1.25;
      letter-spacing:0;
    }

    .meta {
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      font-weight:650;
    }

    .summary-grid {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }

    .kpi {
      min-height:92px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .kpi span {
      display:block;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .kpi strong {
      display:block;
      margin-top:5px;
      color:var(--ink);
      font-size:24px;
      line-height:1.2;
    }

    .kpi em {
      display:block;
      margin-top:6px;
      color:var(--muted);
      font-size:12px;
      font-style:normal;
    }

    .product-tabs {
      position:sticky;
      top:64px;
      z-index:15;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-bottom:18px;
      padding:10px 0;
      background:#f2f5fa;
    }

    .tab-btn {
      min-height:86px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px 14px;
      background:#fff;
      color:var(--ink);
      text-align:left;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(28,41,70,.04);
    }

    .tab-btn:hover,
    .tab-btn.active {
      border-color:#b8c7ff;
      background:linear-gradient(180deg,#fff,#f8faff);
      box-shadow:var(--shadow);
    }

    .tab-btn strong {
      display:block;
      font-size:15px;
      line-height:1.32;
    }

    .tab-btn span {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:8px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .report-stack {
      display:grid;
      gap:18px;
    }

    .product-report {
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .product-report[hidden] { display:none; }

    .report-head {
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background:#fbfcff;
    }

    .title-row {
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .report-title {
      margin:0;
      font-size:20px;
      line-height:1.3;
    }

    .tag {
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:3px 8px;
      border-radius:999px;
      background:var(--gold-soft);
      color:#8a6618;
      font-size:12px;
      font-weight:750;
      white-space:nowrap;
    }

    .brief {
      margin:10px 0 0;
      color:var(--muted);
      font-size:13px;
      font-weight:650;
      text-wrap:pretty;
    }

    .metric-card {
      border:1px solid #ead8b8;
      border-radius:8px;
      overflow:hidden;
      background:#fffaf2;
    }

    .metric-row {
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      padding:8px 12px;
      border-bottom:1px solid rgba(185,144,53,.18);
      font-variant-numeric:tabular-nums;
    }

    .metric-row:last-child { border-bottom:0; }
    .metric-row span:first-child { color:#5c6470; }
    .metric-row strong { font-weight:750; }

    .section {
      padding:18px 20px;
      border-bottom:1px solid var(--line);
    }

    .section:last-child { border-bottom:0; }

    .section-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .section-title {
      margin:0;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:17px;
      line-height:1.25;
    }

    .section-title:before {
      content:"";
      width:4px;
      height:20px;
      border-radius:2px;
      background:#5f7be8;
    }

    .index-grid {
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:10px;
    }

    .index-card {
      min-height:62px;
      display:grid;
      align-content:center;
      gap:2px;
      padding:10px;
      border:1px solid #ead8b8;
      border-radius:8px;
      background:#fffdf8;
      text-align:center;
    }

    .index-card strong {
      font-size:15px;
      font-variant-numeric:tabular-nums;
    }

    .index-card span {
      color:#4d5666;
      font-size:12px;
      font-weight:700;
    }

    .pos { color:var(--red); font-weight:750; }
    .neg { color:var(--green); font-weight:750; }
    .flat { color:#6d7788; font-weight:750; }

    .chart-wrap {
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(270px,360px);
      gap:16px;
      align-items:stretch;
    }

    .spark-panel {
      min-height:238px;
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(180deg,#fff,#fbfcff);
      padding:12px;
    }

    .spark-panel svg {
      display:block;
      width:100%;
      height:250px;
    }

    .spark-grid line {
      stroke:#e7ecf4;
      stroke-width:1;
    }

    .axis-label {
      fill:#697386;
      font-size:12px;
      font-weight:650;
      font-variant-numeric:tabular-nums;
    }

    .axis-title {
      fill:#8a94a6;
      font-size:12px;
      font-weight:700;
    }

    .spark-line {
      fill:none;
      stroke:#d72b2b;
      stroke-width:3;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .spark-line.dark {
      stroke:#d9bd86;
    }

    .drawdown-zone {
      fill:rgba(68,70,75,.22);
    }

    .chart-side {
      display:grid;
      gap:10px;
    }

    .chart-notes {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .side-note {
      padding:12px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fbfcff;
    }

    .side-note strong {
      display:block;
      margin-bottom:5px;
      font-size:13px;
    }

    .side-note span {
      color:var(--muted);
      font-size:12px;
      font-weight:650;
    }

    .table-wrap {
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
    }

    table {
      width:100%;
      border-collapse:collapse;
      min-width:980px;
    }

    th {
      position:sticky;
      top:0;
      z-index:1;
      padding:10px 12px;
      background:#edf2fb;
      color:#4c63b3;
      text-align:left;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    td {
      padding:10px 12px;
      border-top:1px solid var(--line);
      color:#2a3446;
      vertical-align:middle;
      white-space:nowrap;
      font-size:13px;
    }

    td.product-name {
      min-width:320px;
      white-space:normal;
      font-weight:650;
    }

    tbody tr:hover { background:#fffdf0; }

    .note {
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    .disclosure {
      display:grid;
      gap:6px;
      padding:14px 20px 18px;
      border-top:1px solid var(--line);
      background:#fbfcff;
      color:#6d7788;
      font-size:12px;
    }

    .empty {
      display:none;
      min-height:260px;
      place-items:center;
      border:1px dashed #cfd8e8;
      border-radius:8px;
      background:#fff;
      color:var(--muted);
      font-weight:700;
    }

    .empty.show { display:grid; }

    @media (max-width:900px) {
      .summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .product-tabs { grid-template-columns:1fr; position:static; }
      .report-head,
      .chart-wrap { grid-template-columns:1fr; }
      .chart-notes { grid-template-columns:1fr; }
      .index-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
    }

    @media (max-width:760px) {
      .topbar {
        position:static;
        align-items:flex-start;
        flex-direction:column;
        padding:14px 18px;
      }

      .toolbar,
      .search { width:100%; }

      .workspace { padding:18px 18px 96px; }
      .page-head { display:block; }
      .summary-grid,
      .index-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

        drawdownLabel: "2026-05 至 2026-06 最大回撤区间",
        spark: "M8 128 C72 128 122 128 178 128 C232 129 272 130 318 126 C356 122 382 122 410 126 C445 132 448 154 482 158 C520 162 548 158 580 160 C620 164 630 174 666 178 C700 181 718 170 734 120 C742 94 754 78 782 78 C832 78 850 90 902 96 C956 102 990 101 1032 102",
        drawdownZone: { x: 420, width: 310 },
        yTicks: ["1.03", "1.02", "1.01", "1.00", "0.99", "0.98", "0.97", "0.96"],
        xTicks: [
          { x: 45, label: "2026-04-29" },
          { x: 180, label: "2026-05-08" },
          { x: 315, label: "2026-05-22" },
          { x: 450, label: "2026-06-01" },
          { x: 585, label: "2026-06-08" },
          { x: 720, label: "2026-06-15" },
          { x: 875, label: "2026-06-29" },
          { x: 1030, label: "2026-07-03" }
        ],
        holdings: [
          ["本产品", "-0.12%", "0.6%", "--", "2026-04-29", "2026-07-03"],
          ["艾方博云尊享9号私募证券投资基金（期货CTA-中低频）", "-1.2%", "1.49%", "10.03%", "2026-05-22", "2026-07-03"],
          ["世纪前沿兴泰进取1号私募证券投资基金B类份额（指数增强-中小盘指增）", "--", "1.39%", "5.14%", "2026-06-26", "2026-07-03"],
          ["世纪前沿中证A500指数增强8号私募证券投资基金B类（指数增强-大盘指增）", "0.13%", "5.7%", "10.45%", "2026-05-21", "2026-07-03"],
          ["超量子省心享兴泰进取1号私募证券投资基金B类（指数增强-中小盘指增）", "0.76%", "-1.46%", "13.3%", "2026-05-21", "2026-07-03"],
          ["远澜HT翠柏8号私募证券投资基金B类（期货CTA-中低频）", "-1.21%", "0.02%", "9.88%", "2026-05-20", "2026-07-03"],
          ["知行通达省心享兴泰锐进元合3号私募证券投资基金B类（指数增强-中小盘指增）", "1.05%", "7.1%", "4.07%", "2026-06-08", "2026-07-03"],
          ["明泓兴泰1号私募证券投资基金B类份额（指数增强-中小盘指增）", "-2.17%", "1.39%", "15.19%", "2026-05-25", "2026-07-03"],
          ["龙旗锐泰一号私募证券投资基金B类（指数增强-中小盘指增）", "0.57%", "-0.39%", "9.59%", "2026-05-26", "2026-07-03"],
          ["磐松HT全市场指数增强进取1号私募证券投资基金（指数增强-中小盘指增）", "3.38%", "-4.14%", "3.77%", "2026-05-26", "2026-07-03"]
        ]
      }
    ];

    function valueTone(value) {
      const text = String(value ?? "");
      if (text.startsWith("-")) return "neg";
      if (text === "--") return "flat";
      return "pos";
    }

    function renderIndexCards() {
      return INDEX_PERFORMANCE.map(item => `
        <div class="index-card">
          <strong class="${item.tone}">${item.value}</strong>
          <span>${item.name}</span>
        </div>
      `).join("");
    }

    function renderRows(rows) {
      return rows.map(row => `
        <tr>
          <td class="product-name">${row[0]}</td>
          <td class="${valueTone(row[1])}">${row[1]}</td>
          <td class="${valueTone(row[2])}">${row[2]}</td>
          <td>${row[3]}</td>
          <td>${row[4]}</td>
          <td>${row[5]}</td>
        </tr>
      `).join("");
    }

    function renderYAxis(ticks) {
      const top = 30;
      const bottom = 190;
      const step = ticks.length > 1 ? (bottom - top) / (ticks.length - 1) : 0;
      return ticks.map((label, index) => {
        const y = top + step * index + 4;
        return `<text class="axis-label" x="10" y="${y}" text-anchor="start">${label}</text>`;
      }).join("");
    }

    function renderXAxis(ticks) {
      return ticks.map(item => `
        <text class="axis-label" x="${item.x}" y="232" text-anchor="middle" transform="rotate(-34 ${item.x} 232)">${item.label}</text>
      `).join("");
    }

    function renderReport(product) {
      const lineClass = product.theme === "dark" ? "spark-line dark" : "spark-line";
      return `
        <article class="product-report" id="${product.id}" data-search="${[product.title, product.shortTitle, product.holdings.flat().join(" ")].join(" ")}">
          <div class="report-head">
            <div>
              <div class="title-row">
                <h2 class="report-title">${product.reportTitle}</h2>
                <span class="tag">${product.period}</span>
              </div>
              <p class="brief">${product.summary}</p>
            </div>
          </div>

          <section class="section">
            <div class="section-head">
              <h3 class="section-title">净值运行概览</h3>
              <span class="pill">最大回撤区间已标注</span>
            </div>
            <div class="chart-wrap">
              <div class="spark-panel">
                <svg viewBox="0 0 1060 260" role="img" aria-label="${product.shortTitle}净值走势示意">
                  <g class="spark-grid">
                    <line x1="0" y1="30" x2="1060" y2="30"></line>
                    <line x1="0" y1="70" x2="1060" y2="70"></line>
                    <line x1="0" y1="110" x2="1060" y2="110"></line>
                    <line x1="0" y1="150" x2="1060" y2="150"></line>
                    <line x1="0" y1="190" x2="1060" y2="190"></line>
                    <line x1="120" y1="20" x2="120" y2="204"></line>
                    <line x1="300" y1="20" x2="300" y2="204"></line>
                    <line x1="480" y1="20" x2="480" y2="204"></line>
                    <line x1="660" y1="20" x2="660" y2="204"></line>
                    <line x1="840" y1="20" x2="840" y2="204"></line>
                  </g>
                  <rect class="drawdown-zone" x="${product.drawdownZone.x}" y="20" width="${product.drawdownZone.width}" height="184" rx="2"></rect>
                  <path class="${lineClass}" d="${product.spark}"></path>
                  <text class="axis-title" x="10" y="18">单位净值</text>
                  ${renderYAxis(product.yTicks)}
                  ${renderXAxis(product.xTicks)}
                </svg>
              </div>
              <div class="chart-side">
                <div class="metric-card" aria-label="${product.shortTitle}关键指标">
                  <div class="metric-row"><span>产品成立日</span><strong>${product.established}</strong></div>
                  <div class="metric-row"><span>复权单位净值</span><strong>${product.nav}</strong></div>
                  <div class="metric-row"><span>累计收益</span><strong class="${valueTone(product.cumulative)}">${product.cumulative}</strong></div>
                  <div class="metric-row"><span>最大回撤</span><strong class="neg">${product.maxDrawdown}</strong></div>
                  <div class="metric-row"><span>本周收益</span><strong class="${valueTone(product.weekReturn)}">${product.weekReturn}</strong></div>
                  ${product.annualized === "--" ? "" : `<div class="metric-row"><span>成立以来年化收益</span><strong>${product.annualized}</strong></div>`}
                </div>
              </div>
            </div>
            <div class="chart-notes">
                <div class="side-note"><strong>观察口径</strong><span>净值数据已扣除母层管理费、子层管理费和业绩报酬。</span></div>
                <div class="side-note"><strong>回撤提示</strong><span>${product.drawdownLabel}</span></div>
                <div class="side-note"><strong>期末净值</strong><span>截至 2026-07-03，单位净值为 ${product.footerNav}。</span></div>
            </div>
          </section>

          <section class="section">
            <div class="section-head">
              <h3 class="section-title">本报告期内各大指数表现</h3>
              <span class="note">红色为上涨，绿色为下跌。</span>
            </div>
            <div class="index-grid">${renderIndexCards()}</div>
          </section>

          <section class="section">
            <div class="section-head">
              <h3 class="section-title">区间业绩信息</h3>
              <span class="note">注：仅披露持仓 3% 以上的持仓标的。</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>产品名称</th>
                    <th>本周收益</th>
                    <th>累计收益</th>
                    <th>期末占比</th>
                    <th>起始日</th>
                    <th>结束日</th>
                  </tr>
                </thead>
                <tbody>${renderRows(product.holdings)}</tbody>
              </table>
            </div>
          </section>

          <div class="disclosure">
            <strong>截至2026-07-03，${product.title}，单位净值为${product.footerNav}</strong>
            <span>注：本报告仅供「${product.title}」投资者阅览，净值数据已扣除母层管理费、子层管理费和业绩报酬，风险揭示：产品历史业绩并不构成投资者所投资产品业绩表现的保证。</span>
            <span>数据来源：Wind、华泰证券资管。</span>
          </div>
        </article>
      `;
    }

    const reportStack = document.getElementById("reportStack");
    const emptyState = document.getElementById("emptyState");
    const searchBox = document.getElementById("searchBox");

    reportStack.innerHTML = PRODUCTS.map(renderReport).join("");

    function setActiveProduct(productId) {
      document.querySelectorAll("[data-product-tab]").forEach(button => {
        button.classList.toggle("active", button.dataset.productTab === productId);
      });
      document.querySelectorAll(".product-report").forEach(report => {
        report.hidden = report.id !== productId;
      });
      searchBox.value = "";
      emptyState.classList.remove("show");
      reportStack.style.display = "";
    }

    function applySearch() {
      const keyword = searchBox.value.trim().toLowerCase();
      const reports = Array.from(document.querySelectorAll(".product-report"));
      if (!keyword) {
        const active = document.querySelector("[data-product-tab].active")?.dataset.productTab || "fof199";
        setActiveProduct(active);
        return;
      }
      let visibleCount = 0;
      document.querySelectorAll("[data-product-tab]").forEach(button => button.classList.remove("active"));
      reports.forEach(report => {
        const matched = report.dataset.search.toLowerCase().includes(keyword);
        report.hidden = !matched;
        if (matched) visibleCount += 1;
      });
      reportStack.style.display = visibleCount ? "" : "none";
      emptyState.classList.toggle("show", visibleCount === 0);
    }

    document.addEventListener("click", event => {
      const tab = event.target.closest("[data-product-tab]");
      if (!tab) return;
      setActiveProduct(tab.dataset.productTab);
    });

    searchBox.addEventListener("input", applySearch);
    setActiveProduct("fof199");
  </script>
</body>
</html>
