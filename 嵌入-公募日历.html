      <div class="workspace"><div class="page-head"><div><h1>产品日历</h1><div class="meta">2026年7月公募产品销售日历，首发 / 持营 / 募集期 / 额度状态分色展示。</div></div></div><div class="module-grid" aria-label="产品日历分类"><button class="module-card placeholder" type="button"><h2>私募</h2><p>首发产品、私享持营池、其他持营申购窗口。</p><div class="module-card-foot"><span>已配置</span><span>查看</span></div></button><button class="module-card active" type="button"><h2>公募</h2><p>公募新发、重点营销期、定开/持营安排。</p><div class="module-card-foot"><span>当前页</span><span>查看</span></div></button><button class="module-card placeholder" type="button"><h2>固收/结构化/QDII</h2><p>票息、观察日、募集期、额度状态及海外节假日。</p><div class="module-card-foot"><span>见固收版</span><span>已另存</span></div></button></div><div class="kpis"><div class="kpi"><span>7月首发</span><strong id="kpiLaunch">7只</strong></div><div class="kpi"><span>主动权益首发</span><strong id="kpiActive">3只</strong></div><div class="kpi"><span>权益指数首发</span><strong id="kpiIndex">3只</strong></div><div class="kpi"><span>持营产品</span><strong id="kpiHold">16只</strong></div></div><section class="panel">

  <div class="modal-overlay" id="launchOverlay" hidden><div class="material-modal" role="dialog" aria-modal="true"><div class="modal-head"><strong id="launchTitle">首发产品</strong><button class="modal-close" data-launch-close type="button" aria-label="关闭">×</button></div><div class="modal-body" id="launchModalBody"></div></div></div>
  <div class="drawer-overlay" id="drawerOverlay" hidden><aside class="drawer" role="dialog" aria-modal="true"><div class="drawer-head"><strong id="drawerTitle">产品详情</strong><button class="drawer-close" data-close-drawer type="button" aria-label="关闭">×</button></div><div class="drawer-body" id="drawerBody"></div></aside></div>
  <script src="data/productCalendarData.js?v=20260720_public_calendar_metrics_v3"></script><script>
    const PRODUCTS=window.productCalendarData.public.PRODUCTS;
    const POLICY_BY_NAME=window.productCalendarData.public.POLICY_BY_NAME;
    const METRICS_BY_NAME=window.productCalendarData.public.METRICS_BY_NAME;
    const state={category:"all",query:""};
    const weekdays=["周一","周二","周三","周四","周五"];
    function beijingToday(){const p=new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',year:'numeric',month:'numeric',day:'numeric'}).formatToParts(new Date()).reduce((a,x)=>(a[x.type]=Number(x.value)||x.value,a),{});return {year:Number(p.year),month:Number(p.month),day:Number(p.day)}}
    const TODAY=beijingToday();
    const TODAY_DAY=TODAY.month===7?TODAY.day:null;
    function productPolicy(product){return POLICY_BY_NAME[product.name]||product.policy||"待补充"}
    const LAUNCH_RICH_CONTENT=window.productCalendarData.public.LAUNCH_RICH_CONTENT;
    function parseRange(product){const matches=[...product.period.matchAll(/2026\/(\d+)\/(\d+)/g)].map(m=>({month:Number(m[1]),day:Number(m[2])}));const start=matches[0]||{month:7,day:1};const end=matches[1]||start;return {start,end}}
    function startDay(product){const range=parseRange(product);return range.start.month<7?1:range.start.day}
    function endDay(product){const range=parseRange(product);return range.end.month>7?31:range.end.day}
    function activeOn(product,day){return day>=startDay(product)&&day<=endDay(product)}
    function isEnded(product){return product.status==="已结束"||endDay(product)<TODAY_DAY}
    function isWorkday(day){const w=new Date(2026,6,day).getDay();return w>=1&&w<=5}
    function workdays(){return Array.from({length:31},(_,i)=>i+1).filter(isWorkday)}
    function launchProducts(){return PRODUCTS.filter(p=>p.section==="首发"&&(state.category==="all"||p.category===state.category)&&matches(p))}
    function holdProducts(){return PRODUCTS.filter(p=>p.section==="持营"&&matches(p))}
    function matches(p){const q=state.query.trim().toLowerCase();return !q||[p.name,p.code,p.category,p.style,p.period,p.status].join(" ").toLowerCase().includes(q)}
    function renderCalendar(){const days=[-2,-1].concat(workdays());let html=weekdays.map(w=>`<div class="weekday">${w}</div>`).join("");html+=days.map(day=>{const muted=day<1;const dateText=muted?(day===-2?"2026/6/29":"2026/6/30"):`2026/7/${day}`;const events=muted?[]:launchProducts().filter(p=>activeOn(p,day));return `<div class="day ${muted?"muted":""} ${day===TODAY_DAY?"current":""}"><div class="day-head"><span>${dateText}</span><span>${muted?"":events.length+"项"}</span></div><div class="day-body">${events.map(p=>{const ended=isEnded(p);return `<button class="event ${p.category} ${ended?"ended":""}" type="button" data-name="${p.name}"><strong>${p.name}</strong><small>${ended?"已结束｜":""}${p.category}｜${p.style}｜${p.period}</small></button>`}).join("")}</div></div>`}).join("");document.getElementById("calendar").innerHTML=html}
    function renderLaunchTable(){const rows=launchProducts().sort((a,b)=>startDay(a)-startDay(b));document.getElementById("emptyState").hidden=rows.length>0;document.getElementById("launchRows").innerHTML=rows.map(p=>{const ended=isEnded(p);return `<tr class="${ended?"ended":""}" data-name="${p.name}"><td class="nowrap">7月${startDay(p)}日-7月${endDay(p)}日</td><td><span class="tag ${p.category}">${p.category}</span>${ended?` <span class="tag ended">已结束</span>`:""}</td><td>${p.style}</td><td>${p.name}</td><td>${p.code}</td><td>${p.period}</td><td>${p.custody}</td><td>${p.salesCoef}</td><td>${p.holdingCoef}</td></tr>`}).join("")}
    function fundMetric(name){return METRICS_BY_NAME[name]||{}}
    function metricBox(label,value,rank){return `<div class="metric"><span>${label}</span><strong>${value||"--"}</strong>${rank?`<em>同类排名 ${rank}</em>`:""}</div>`}
    function latestMetricDate(){const dates=holdProducts().map(p=>fundMetric(p.name).asOf).filter(Boolean).sort();return dates.length?dates[dates.length-1]:"--"}
    function tagTextColor(hex){if(!hex)return"";const n=parseInt(hex.slice(1),16);const r=n>>16,g=n>>8&255,b=n&255;return (r*299+g*587+b*114)/1000<150?"#fff":"#17233b"}
    function tagStyle(product){return product.tagColor?`style="background:${product.tagColor};border-color:${product.tagColor};color:${tagTextColor(product.tagColor)}"`:""}
    function renderHoldingCards(){const rows=holdProducts();document.getElementById("holdingCards").innerHTML=rows.map(p=>{const m=fundMetric(p.name);const tone=tagStyle(p);const cardTone=p.tagColor?`style="border-left-color:${p.tagColor}"`:"";return `<article class="fund-card ${p.category}" ${cardTone} data-name="${p.name}"><div class="fund-top"><div><div class="fund-name">${p.name}<span class="fund-code">${p.code}</span></div><div class="chips"><span class="chip" ${tone}>${p.category}</span><span class="chip" ${tone}>${p.style}</span><span class="chip" ${tone}>档期 ${p.period}</span><span class="chip recommend">持营</span></div></div><button class="chip" type="button" data-name="${p.name}">详情</button></div><p class="brief">${p.intro}</p><div class="policy-box"><strong>天天基金数据 ${m.asOf?`截至 ${m.asOf}`:""}</strong><div class="metrics">${metricBox("单位净值",m.unitNav)}${metricBox("近1月",m.oneMonth,m.rankOneMonth)}${metricBox("今年来",m.ytd,m.rankYtd)}${metricBox("近1年",m.oneYear,m.rankOneYear)}</div><div style="margin-top:8px;color:#7b8494;font-size:12px">取数代码：${m.code||"--"}；来源：天天基金。</div></div></article>`}).join("")}
    function launchModalContent(p){if(LAUNCH_RICH_CONTENT[p.name])return LAUNCH_RICH_CONTENT[p.name](p);return `<div class="modal-text"><h3>${p.name}</h3><div class="modal-kv"><span>首发/持营</span><strong>${p.section}</strong><span>资产类别</span><strong>${p.category}</strong><span>风格策略</span><strong>${p.style}</strong><span>产品代码</span><strong>${p.code}</strong><span>产品档期</span><strong>${p.period}</strong><span>券结/托管</span><strong>${p.custody}</strong><span>销量系数</span><strong>${p.salesCoef}</strong><span>保有系数</span><strong>${p.holdingCoef}</strong></div><div class="modal-section"><h4>产品简介</h4><p>${p.intro}</p></div><div class="modal-section"><h4>激励政策</h4><p>${productPolicy(p)}</p></div></div>`}
    function openLaunchModal(name){const p=PRODUCTS.find(x=>x.name===name);if(!p)return;document.getElementById("launchTitle").textContent=p.name+"｜首发产品";document.getElementById("launchModalBody").innerHTML=launchModalContent(p);document.getElementById("launchOverlay").hidden=false;document.body.classList.add("modal-open")}
    function closeLaunchModal(){document.getElementById("launchOverlay").hidden=true;document.body.classList.remove("modal-open")}
    function openDrawer(name){const p=PRODUCTS.find(x=>x.name===name);if(!p)return;const m=fundMetric(p.name);document.getElementById("drawerTitle").textContent=p.name;document.getElementById("drawerBody").innerHTML=`<section class="drawer-section"><h3>基础信息</h3><div class="kv"><span>首发/持营</span><strong>${p.section}</strong><span>资产类别</span><strong>${p.category}</strong><span>风格策略</span><strong>${p.style}</strong><span>产品代码</span><strong>${p.code}</strong><span>产品档期</span><strong>${p.period}</strong><span>券结/托管</span><strong>${p.custody}</strong><span>销量系数</span><strong>${p.salesCoef}</strong><span>保有系数</span><strong>${p.holdingCoef}</strong></div></section><section class="drawer-section"><h3>天天基金数据</h3><div class="kv"><span>取数代码</span><strong>${m.code||"--"}</strong><span>数据日期</span><strong>${m.asOf||"--"}</strong><span>单位净值</span><strong>${m.unitNav||"--"}</strong><span>近1月</span><strong>${m.oneMonth||"--"} / ${m.rankOneMonth||"--"}</strong><span>今年来</span><strong>${m.ytd||"--"} / ${m.rankYtd||"--"}</strong><span>近1年</span><strong>${m.oneYear||"--"} / ${m.rankOneYear||"--"}</strong></div></section><section class="drawer-section"><h3>产品简介</h3><p>${p.intro}</p></section><section class="drawer-section"><h3>激励政策</h3><p>${productPolicy(p)}</p></section>`;document.getElementById("drawerOverlay").hidden=false}
    function renderKpis(){const launch=PRODUCTS.filter(p=>p.section==="首发");document.getElementById("kpiLaunch").textContent=launch.length+"只";document.getElementById("kpiActive").textContent=launch.filter(p=>p.category==="主动权益").length+"只";document.getElementById("kpiIndex").textContent=launch.filter(p=>p.category==="权益指数").length+"只";document.getElementById("kpiHold").textContent=PRODUCTS.filter(p=>p.section==="持营").length+"只"}
    function render(){renderKpis();renderCalendar();renderLaunchTable();renderHoldingCards();document.getElementById("updateDatePill").textContent="更新日期"+latestMetricDate()}
    document.querySelectorAll("[data-category]").forEach(btn=>btn.addEventListener("click",()=>{state.category=btn.dataset.category;document.querySelectorAll("[data-category]").forEach(b=>b.classList.toggle("active",b===btn));render()}));
    document.getElementById("searchBox").addEventListener("input",e=>{state.query=e.target.value;render()});
    document.addEventListener("click",e=>{const target=e.target.closest("[data-name]");if(target){const p=PRODUCTS.find(x=>x.name===target.dataset.name);if(p&&p.section==="首发"){openLaunchModal(target.dataset.name)}else{openDrawer(target.dataset.name)}return}if(e.target.closest("[data-launch-close]")||e.target.id==="launchOverlay"){closeLaunchModal();return}if(e.target.closest("[data-close-drawer]")||e.target.id==="drawerOverlay"){document.getElementById("drawerOverlay").hidden=true}});
    render();
  </script>
<script id="calendar-switch-bridge">
(function(){
  function targetFromText(text){
    if(!text) return '';
    if(text.indexOf('私募')>-1) return 'private';
    if(text.indexOf('公募')>-1) return 'public';
    if(text.indexOf('固收')>-1 || text.indexOf('结构化')>-1 || text.indexOf('QDII')>-1) return 'fixed';
    return '';
  }
  document.addEventListener('click', function(event){
    var card = event.target.closest('.module-card, .hub-card');
    if(!card) return;
    var titleNode = card.querySelector('h2,h3,.hub-card-title,.card-title,strong');
    var text = (titleNode ? titleNode.textContent : card.textContent) || '';
    var target = targetFromText(text);
    if(!target) return;
    event.preventDefault();
    event.stopPropagation();
    if(window.parent && window.parent !== window){
      window.parent.postMessage({type:'open-calendar', calendar: target}, '*');
    }
  }, true);
})();
