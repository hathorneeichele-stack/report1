<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>销售播报</title>
  <style>
    :root {
      --ink:#1f2a3d;
      --muted:#6d7788;
      --line:#e6ecf5;
      --bg:#f2f5fa;
      --panel:#ffffff;
      --blue:#4268d6;
      --blue-2:#6e8dff;
      --blue-soft:#eef3ff;
      --red:#c9554d;
      --green:#2f9e62;
      --gold:#b88712;
      --gold-soft:#fff6d8;
      --shadow:0 10px 24px rgba(28,41,70,.08);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      color:var(--ink);
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      font-size:14px;
      line-height:1.45;
    }
    .sales-report { min-height:100vh; padding:24px 28px 88px; }
    .topbar {
      min-height:48px;
      margin:-4px 0 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .crumb { color:var(--muted); font-size:13px; font-weight:650; }
    .crumb strong { color:var(--ink); font-size:16px; margin-left:8px; }
    .hero {
      position:relative;
      overflow:hidden;
      border:1px solid #dce4f4;
      border-radius:8px;
      background:
        linear-gradient(135deg, rgba(66,104,214,.96), rgba(23,35,59,.98)),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.25), transparent 32%);
      color:#fff;
      box-shadow:var(--shadow);
      padding:26px 30px;
    }
    .hero:after {
      content:"";
      position:absolute;
      right:-90px;
      top:-110px;
      width:340px;
      height:340px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:50%;
    }
    .hero-inner { position:relative; z-index:1; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:24px; align-items:end; }
    .eyebrow { margin:0 0 8px; color:#dbe6ff; font-weight:750; }
    h1 { margin:0; font-size:32px; letter-spacing:0; line-height:1.15; }
    .asof {
      display:grid;
      gap:4px;
      min-width:260px;
      padding:14px 16px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:8px;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
    }
    .asof span { color:#dbe6ff; font-size:12px; }
    .asof strong { font-size:22px; }
    .date-stack { display:grid; grid-template-columns:minmax(220px,1fr); gap:10px; }
    .summary-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-top:18px; }
    .metric-card {
      min-height:126px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      box-shadow:var(--shadow);
      display:grid;
      gap:8px;
      align-content:start;
    }
    .metric-card .label { color:var(--muted); font-weight:750; }
    .metric-card .value { font-size:30px; line-height:1; font-weight:850; letter-spacing:0; }
    .metric-card .unit { color:var(--muted); font-size:13px; }
    .progress { height:8px; overflow:hidden; border-radius:999px; background:#edf1f8; }
    .progress i { display:block; height:100%; width:var(--w); max-width:100%; border-radius:inherit; background:linear-gradient(90deg,var(--blue),var(--blue-2)); }
    .cell-bar { min-width:74px; }
    .cell-bar strong { display:block; text-align:center; font-variant-numeric:tabular-nums; }
    .cell-track { margin:4px auto 0; height:6px; border-radius:999px; overflow:hidden; }
    .cell-track i { display:block; height:100%; width:var(--w); border-radius:inherit; }
    .cell-track.blue i { background:linear-gradient(90deg,var(--blue),var(--blue-2)); }
    .cell-track.red i { background:linear-gradient(90deg,#cf5148,#f0aca3); }
    .cell-track.yellow i { background:linear-gradient(90deg,#d69a17,#f1cf65); }
    .heat-cell { min-height:34px; display:grid; place-items:center; border-radius:0; font-weight:850; font-variant-numeric:tabular-nums; }
    .rate-heat { background:rgba(201,85,77,var(--heat,.18)); color:#b4443e; }
    .lift-cell { background:rgba(217,154,22,var(--heat,.18)); color:#9a6a08; }
    .lift-cell.up { color:#9a6a08; }
    .lift-cell.down { background:#e4f2ea; color:#2f9e62; }
    .section { margin-top:18px; border:1px solid var(--line); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); overflow:hidden; }
    .section-head { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .section-title { margin:0; font-size:18px; display:flex; align-items:center; gap:10px; }
    .section-title:before { content:""; width:4px; height:20px; border-radius:2px; background:var(--blue); display:block; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:var(--blue-soft); color:var(--blue); font-weight:700; font-size:12px; white-space:nowrap; }
    .module-switch { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .module-switch button {
      min-height:42px;
      border:1px solid #d6e0f2;
      border-radius:8px;
      padding:9px 14px;
      background:#fff;
      color:#41506a;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(28,41,70,.05);
    }
    .module-switch button.active {
      border-color:#b8c7ff;
      background:#eef3ff;
      color:var(--blue);
      box-shadow:inset 3px 0 0 var(--blue-2), 0 6px 16px rgba(28,41,70,.05);
    }
    .sales-module[hidden] { display:none; }
    .content-pad { padding:18px; }
    .top-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    table { width:100%; border-collapse:collapse; }
    .branch-table { min-width:1120px; font-size:11.5px; table-layout:fixed; }
    th { background:#edf2fb; color:#4c63b3; font-weight:800; text-align:center; padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
    td { padding:10px 12px; border-bottom:1px solid #eef2f7; vertical-align:middle; text-align:center; }
    .branch-table th { padding:7px 6px; text-align:center; font-size:11.5px; }
    .branch-table td { padding:7px 6px; }
    .branch-table .rank { width:36px; }
    .branch-table .branch-cell { width:112px; white-space:nowrap; }
    .branch-table .branch-cell strong { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12.5px; }
    .branch-table .rate { min-width:72px; }
    tr:last-child td { border-bottom:0; }
    tbody tr:hover { background:#fffdf4; }
    .num { text-align:center; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .rank { width:42px; color:var(--gold); font-weight:900; }
    .branch-cell strong, .person strong { display:block; font-size:14px; }
    .sub { display:block; color:var(--muted); font-size:12px; margin-top:2px; }
    .rate { min-width:104px; }
    .rate strong { display:block; margin-bottom:6px; font-variant-numeric:tabular-nums; }
    .mini-list { display:grid; gap:10px; }
    .person {
      display:grid;
      grid-template-columns:minmax(82px,.32fr) minmax(0,1fr) auto;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      border:1px solid #edf1f7;
      border-radius:8px;
      background:#fbfcff;
    }
    .name-pill { min-height:34px; padding:7px 10px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:#fff; font-weight:850; white-space:nowrap; }
    .rank-panel.public .name-pill { border:1px solid #f1c86a; color:#9a6a08; }
    .rank-panel.private .name-pill { border:1px solid #9fb6ff; color:#4268d6; }
    .rank-panel.combined .name-pill { border:1px solid #efaaa3; color:#c9554d; }
    .amount { font-weight:850; color:#1f2a3d; font-variant-numeric:tabular-nums; }
    .rank-panel { border:1px solid var(--line); border-radius:8px; background:#fff; overflow:hidden; }
    .rank-panel h3 { margin:0; padding:12px 14px; border-bottom:1px solid var(--line); background:#fbfcff; font-size:15px; }
    .bucket-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .bucket-matrix { display:grid; grid-template-columns:112px repeat(3,minmax(0,1fr)); gap:14px; }
    .bucket-label-column { padding-top:45px; display:grid; gap:8px; }
    .bucket-label-only { min-height:28px; display:flex; align-items:center; color:#536176; font-weight:850; white-space:nowrap; }
    .bucket-card { border:1px solid var(--line); border-radius:8px; background:#fff; overflow:hidden; }
    .bucket-card h3 { margin:0; padding:12px 14px; border-bottom:1px solid var(--line); background:#fbfcff; font-size:15px; }
    .bucket-body { padding:12px 14px 14px; display:grid; gap:8px; }
    .bucket-row { display:grid; grid-template-columns:44px minmax(170px,1fr) 58px; gap:10px; align-items:center; min-height:28px; }
    .bucket-people { text-align:right; font-weight:850; font-variant-numeric:tabular-nums; }
    .bucket-track { height:10px; border-radius:999px; background:transparent; overflow:hidden; }
    .bucket-track i { display:block; height:100%; width:var(--w); border-radius:inherit; background:var(--bucket-color,#4268d6); }
    .bucket-card.public { --bucket-color:#d99a16; }
    .bucket-card.private { --bucket-color:#4268d6; }
    .bucket-card.combined { --bucket-color:#c9554d; }
    .bucket-amount { display:grid; grid-template-columns:72px minmax(90px,1fr); gap:8px; align-items:center; color:#536176; font-size:12px; font-weight:750; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .bucket-share { text-align:right; color:#1f2a3d; font-weight:850; font-variant-numeric:tabular-nums; }
    .product-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .product-card { border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff; }
    .product-top {
      padding:18px;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:start;
      background:linear-gradient(180deg,#fbfcff,#ffffff);
      border-bottom:1px solid var(--line);
    }
    .product-top h3 { margin:0; font-size:22px; }
    .product-stats { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .stat-chip { padding:6px 9px; border-radius:999px; background:#f0f3f8; color:#536176; font-size:12px; font-weight:750; }
    .product-body { display:grid; grid-template-columns:1fr 1fr; gap:0; }
    .product-pane { padding:14px; min-width:0; }
    .product-pane + .product-pane { border-left:1px solid var(--line); }
    .pane-title { margin:0 0 10px; color:#41506a; font-size:14px; }
    .bar-row { display:grid; grid-template-columns:88px minmax(0,1fr) 74px; gap:8px; align-items:center; min-height:46px; border-bottom:1px solid #f0f3f8; }
    .bar-row:last-child { border-bottom:0; }
    .branch-metric-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; align-items:center; min-height:46px; padding:0; border-bottom:1px solid #f0f3f8; }
    .branch-metric-row:last-child { border-bottom:0; }
    .metric-pair { display:grid; gap:1px; justify-items:center; font-variant-numeric:tabular-nums; }
    .metric-pair strong { font-size:14px; line-height:1.1; }
    .metric-pair span { color:var(--muted); font-size:11px; white-space:nowrap; }
    .bar-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#536176; font-weight:750; }
    .bar-track { height:8px; border-radius:999px; background:#eef2f8; overflow:hidden; }
    .bar-track i { display:block; height:100%; width:var(--w); border-radius:inherit; background:var(--blue); }
    .bar-val { text-align:right; font-size:12px; font-weight:800; font-variant-numeric:tabular-nums; }
    .deal-table { grid-column:1 / -1; border-top:1px solid var(--line); }
    .deal-table th { font-size:12px; }
    .source-note { margin-top:14px; color:var(--muted); font-size:12px; }
    @media (max-width:1100px) {
      .sales-report { padding:18px; }
      .hero-inner, .top-grid, .product-grid, .product-body, .date-stack { grid-template-columns:1fr; }
      .bucket-matrix { grid-template-columns:1fr; }
      .bucket-label-column { display:none; }
      .summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .product-pane + .product-pane { border-left:0; border-top:1px solid var(--line); }
    }
    @media (max-width:720px) {
      h1 { font-size:27px; }
      .summary-grid { grid-template-columns:1fr; }
      .section-head { align-items:flex-start; flex-direction:column; }
      .content-pad { overflow-x:auto; }
      table { min-width:760px; }
    }
  </style>
</head>
<body>
  <main class="sales-report">
    <div class="topbar">
      <div class="crumb">产品运营工作台 / <strong>销售播报</strong></div>
      <span class="pill">2026-07-07更新</span>

    <section class="hero">
      <div class="hero-inner">
        <div>

          <h1>销售播报</h1>

        <div class="date-stack">
          <div class="asof"><span id="asOfLabel">标准销量统计日</span><strong id="asOf">-</strong></div>
        </div>
      </div>
    </section>

    <nav class="module-switch" aria-label="销售播报模块">
      <button class="active" type="button" data-sales-tab="standard">公私募标准销量</button>
      <button type="button" data-sales-tab="products">重点产品首发播报</button>

    <div class="sales-module" data-sales-module="standard">
      <div id="summary" class="summary-grid"></div>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">营业部标准销量完成情况</h2>
          <span class="pill">按公私募总当日提升降序</span>
        </div>
        <div class="content-pad">
            <table class="branch-table">
              <thead>
                <tr>
                  <th>排名</th><th>营业部</th>
                  <th class="num">公募标准销量</th><th>公募完成率</th><th class="num">公募统计日新增</th><th class="num">公募当日提升</th>
                  <th class="num">私募标准销量</th><th>私募完成率</th><th class="num">私募统计日新增</th><th class="num">私募当日提升</th>

                </tr>
              </thead>
              <tbody id="branchRows"></tbody>
            </table>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">个人标销 TOP5</h2>
          <span class="pill">金额单位：万元</span>
        </div>
        <div class="content-pad top-grid">
          <div class="rank-panel public"><h3>公募标销 TOP5</h3><div id="publicTopRows" class="mini-list content-pad"></div></div>
          <div class="rank-panel private"><h3>私募标销 TOP5</h3><div id="privateTopRows" class="mini-list content-pad"></div></div>
          <div class="rank-panel combined"><h3>标销汇总 TOP5</h3><div id="combinedTopRows" class="mini-list content-pad"></div></div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">个人标销分档人数</h2>
          <span class="pill">分档区间更细，金额为累计标销</span>
        </div>
        <div id="bucketRows" class="content-pad bucket-matrix"></div>
      </section>
    </div>

    <div class="sales-module" data-sales-module="products" hidden>
      <section class="section">
        <div class="section-head">
          <h2 class="section-title">重点产品首发播报</h2>
          <span class="pill">统计日 20260707</span>
        </div>
        <div class="content-pad">
          <div id="productRows" class="product-grid"></div>
        </div>
      </section>
    </div>
  </main>

    const fmtWan = (v) => {
      const n = Number(v || 0);
      if (Math.abs(n) >= 1000) return n.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
      return n.toLocaleString('zh-CN', { maximumFractionDigits: n % 1 === 0 ? 0 : 1 });
    };
    const fmtYuanWan = (v) => fmtWan(Number(v || 0) / 10000);
    const pct = (v) => `${(Number(v || 0) * 100).toFixed(1)}%`;
    const firstChar = (name) => [...String(name || '')][0] || '人';
    const widthPct = (value, max) => `${Math.max(4, Math.min(100, Number(value || 0) / Math.max(1, max) * 100))}%`;

    function renderSummary() {
      const standard = reportData.standard;
      const total = standard.totals;
      document.getElementById('asOf').textContent = standard.as_of || '-';
      const cards = [
        ['公私募汇总', fmtWan(total.combined_amount), '目标 ' + fmtWan(total.combined_target) + ' 万元', total.combined_rate],
        ['公募标准销量', fmtWan(total.public_amount), '目标 ' + fmtWan(total.public_target) + ' 万元', total.public_rate],
        ['私募标准销量', fmtWan(total.private_amount), '目标 ' + fmtWan(total.private_target) + ' 万元', total.private_rate],
        ['统计日新增', fmtWan(total.combined_new), '当日提升 ' + pct(total.combined_lift), total.combined_rate]
      ];
      document.getElementById('summary').innerHTML = cards.map(([label, value, unit, rate]) => `
        <div class="metric-card">
          <div class="label">${label}</div>
          <div><span class="value">${value}</span><span class="unit"> 万元</span></div>
          <div class="unit">${unit}</div>
          <div class="progress" aria-label="${label}完成率"><i style="--w:${Math.min(100, Number(rate || 0) * 100)}%"></i></div>
        </div>
      `).join('');
    }

    function renderBranches() {
      const maxPublic = Math.max(...reportData.standard.branches.map(item => item.public_amount), 1);
      const maxPrivate = Math.max(...reportData.standard.branches.map(item => item.private_amount), 1);
      const maxCombined = Math.max(...reportData.standard.branches.map(item => item.combined_amount), 1);
      const maxRateHeat = Math.max(...reportData.standard.branches.flatMap(item => [item.public_rate, item.private_rate, item.combined_rate]).map(value => Math.abs(Number(value || 0))), 0.001);
      const maxLiftHeat = Math.max(...reportData.standard.branches.flatMap(item => [item.public_lift, item.private_lift, item.combined_lift]).map(value => Math.abs(Number(value || 0))), 0.001);
      const amountBar = (value, max) => `<div class="cell-bar"><strong>${fmtWan(value)}</strong><div class="cell-track blue"><i style="--w:${widthPct(value, max)}"></i></div></div>`;
      const rateHeatCell = (value) => {
        const heat = 0.14 + Math.min(0.72, Math.abs(Number(value || 0)) / maxRateHeat * 0.72);
        return `<div class="heat-cell rate-heat" style="--heat:${heat.toFixed(3)}">${pct(value)}</div>`;
      };
      const liftCell = (value) => {
        const heat = 0.14 + Math.min(0.72, Math.abs(Number(value || 0)) / maxLiftHeat * 0.72);
        return `<div class="heat-cell lift-cell ${Number(value || 0) >= 0 ? 'up' : 'down'}" style="--heat:${heat.toFixed(3)}">${Number(value || 0) >= 0 ? '+' : ''}${pct(value)}</div>`;
      };
      document.getElementById('branchRows').innerHTML = reportData.standard.branches.map((row, index) => `
        <tr>
          <td class="rank">${String(index + 1).padStart(2, '0')}</td>
          <td class="branch-cell" title="${row.branch}"><strong>${row.branch}</strong></td>
          <td class="num">${amountBar(row.public_amount, maxPublic)}</td>
          <td class="rate">${rateHeatCell(row.public_rate)}</td>
          <td class="num">${fmtWan(row.public_new)}</td>
          <td class="num">${liftCell(row.public_lift)}</td>
          <td class="num">${amountBar(row.private_amount, maxPrivate)}</td>
          <td class="rate">${rateHeatCell(row.private_rate)}</td>
          <td class="num">${fmtWan(row.private_new)}</td>
          <td class="num">${liftCell(row.private_lift)}</td>
          <td class="num">${amountBar(row.combined_amount, maxCombined)}</td>
          <td class="rate">${rateHeatCell(row.combined_rate)}</td>
          <td class="num">${fmtWan(row.combined_new)}</td>
          <td class="num">${liftCell(row.combined_lift)}</td>
        </tr>
      `).join('');
    }

    function renderTopList(targetId, rows, metricKey) {
      document.getElementById(targetId).innerHTML = rows.map((row, index) => `
        <div class="person">
          <div class="name-pill">${row.name}</div>
          <div><strong>${row.branch}</strong><span class="sub">公募 ${fmtWan(row.public_amount)} / 私募 ${fmtWan(row.private_amount)}</span></div>
          <div class="amount">${fmtWan(row[metricKey])}万</div>
        </div>
      `).join('');
    }

    function renderEmployees() {
      renderTopList('publicTopRows', reportData.employeeTop.public, 'public_amount');
      renderTopList('privateTopRows', reportData.employeeTop.private, 'private_amount');
      renderTopList('combinedTopRows', reportData.employeeTop.combined, 'combined_amount');
    }

    function renderBuckets() {
      const titles = { public: '公募各分档人数及占比', private: '私募各分档人数及占比', combined: '标销汇总各分档人数及占比' };
      const labels = reportData.employeeBuckets.public.map(item => item.label);
      const labelColumn = `<div class="bucket-label-column">${labels.map(label => `<div class="bucket-label-only">${label}</div>`).join('')}</div>`;
      const cards = ['public','private','combined'].map(key => {
        const rows = reportData.employeeBuckets[key];
        const maxAmount = Math.max(...rows.map(item => item.amount), 1);
        return `
          <div class="bucket-card ${key}">
            <h3>${titles[key]}</h3>
            <div class="bucket-body">
              ${rows.map(item => `
                <div class="bucket-row">
                  <div class="bucket-people">${item.people}</div>
                  <div class="bucket-amount"><span>${fmtWan(item.amount)}万</span><div class="bucket-track"><i style="--w:${widthPct(item.amount, maxAmount)}"></i></div></div>
                  <div class="bucket-share">${pct(item.share)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('bucketRows').innerHTML = labelColumn + cards;
    }

    function renderProduct(product) {
      const branchMax = Math.max(...product.branches.map(item => item.amount), 1);
      const branchBars = product.branches.map(item => `
        <div class="bar-row">
          <div class="bar-name" title="${item.name}">${item.name}</div>
          <div class="bar-track"><i style="--w:${widthPct(item.amount, branchMax)}"></i></div>
          <div class="bar-val">${fmtYuanWan(item.amount)}万</div>
        </div>
      `).join('');
      const branchMetrics = product.branch_stats.map(item => `
        <div class="branch-metric-row">
          <div class="metric-pair"><strong>${item.people}</strong><span>出单人数</span></div>
          <div class="metric-pair"><strong>${item.clients}</strong><span>出单客户</span></div>
        </div>
      `).join('');
      const deals = product.deals.map((item, index) => `
        <tr>
          <td class="rank">${String(index + 1).padStart(2, '0')}</td>
          <td>${item.branch}</td>
          <td>${item.manager}</td>
          <td class="num">${fmtYuanWan(item.amount)}</td>
          <td class="num">${item.clients}</td>
        </tr>
      `).join('');
      return `
        <article class="product-card">
          <div class="product-top">
            <div>
              <h3>${product.name}</h3>
              <div class="product-stats">
                <span class="stat-chip">销售金额 ${fmtYuanWan(product.total_amount)} 万元</span>
                <span class="stat-chip">出单客户 ${product.total_clients} 户</span>
                <span class="stat-chip">覆盖营业部 ${product.branches.length} 个</span>
              </div>
            </div>
          </div>
          <div class="product-body">
            <div class="product-pane"><h4 class="pane-title">营业部销售</h4>${branchBars}</div>
            <div class="product-pane"><h4 class="pane-title">营业部出单</h4>${branchMetrics}</div>
            <div class="deal-table">
              <table>
                <thead><tr><th>排名</th><th>对应营业部</th><th>服务经理</th><th class="num">金额（万元）</th><th class="num">出单客户</th></tr></thead>
                <tbody>${deals}</tbody>
              </table>
            </div>
          </div>
        </article>
      `;
    }

    function renderProducts() {
      document.getElementById('productRows').innerHTML = reportData.products.map(renderProduct).join('');
    }

    function updateSalesDate(moduleName) {
      const label = document.getElementById('asOfLabel');
      const value = document.getElementById('asOf');
      if (moduleName === 'products') {
        label.textContent = '重点首发产品销售统计日';
        value.textContent = '20260707';
        return;
      }
      label.textContent = '标准销量统计日';
      value.textContent = reportData.standard.as_of || '-';
    }

    function setSalesModule(moduleName) {
      document.querySelectorAll('[data-sales-module]').forEach(section => {
        section.hidden = section.dataset.salesModule !== moduleName;
      });
      document.querySelectorAll('[data-sales-tab]').forEach(button => {
        button.classList.toggle('active', button.dataset.salesTab === moduleName);
      });
      updateSalesDate(moduleName);
    }
    window.setSalesModule = setSalesModule;

    document.addEventListener('click', event => {
      const button = event.target.closest('[data-sales-tab]');
      if (!button) return;
      setSalesModule(button.dataset.salesTab);
    });

    window.addEventListener('message', event => {
      const data = event.data;
      if (!data || data.type !== 'set-sales-module') return;
      setSalesModule(data.module || 'standard');
    });

    renderSummary();
    renderBranches();
    renderEmployees();
    renderBuckets();
    renderProducts();
    updateSalesDate('standard');
  </script>
